<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Coffee Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
    <main class="mx-auto max-w-5xl px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <h1 class="text-2xl font-bold">My Orders</h1>
            <a href="/profile" class="rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium hover:bg-gray-100">Profile</a>
        </div>
        <section class="rounded-2xl bg-white p-4 shadow-sm">
            {% if orders %}
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm">
                    <thead class="border-b bg-gray-50 text-gray-600">
                        <tr>
                            <th class="px-3 py-2">Order</th>
                            <th class="px-3 py-2">Customer</th>
                            <th class="px-3 py-2">Ready time</th>
                            <th class="px-3 py-2">Total</th>
                            <th class="px-3 py-2">Status</th>
                            <th class="px-3 py-2">Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for order in orders %}
                        <tr class="border-b last:border-b-0">
                            <td class="px-3 py-3">#{{ order.id }}</td>
                            <td class="px-3 py-3">{{ order.customer_name }}</td>
                            <td class="px-3 py-3">{{ order.ready_time }}</td>
                            <td class="px-3 py-3">${{ "%.2f"|format(order.total_amount) }}</td>
                            <td class="px-3 py-3">{{ order.status }}</td>
                            <td class="px-3 py-3"><a href="/orders/{{ order.id }}" class="underline">Open</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <p class="py-8 text-center text-gray-600">No orders yet.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
