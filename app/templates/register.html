<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Coffee Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
    <main class="mx-auto flex min-h-screen max-w-lg items-center px-4 py-6">
        <section class="w-full rounded-2xl bg-white p-6 shadow-lg">
            <h1 class="mb-6 text-2xl font-bold">Create account</h1>
            {% if error %}
            <div class="mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</div>
            {% endif %}
            <form method="post" action="/register" class="grid gap-4 sm:grid-cols-2">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="sm:col-span-2">
                    <label class="mb-1 block text-sm font-medium" for="email">Email</label>
                    <input id="email" name="email" type="email" required class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div class="sm:col-span-2">
                    <label class="mb-1 block text-sm font-medium" for="username">Username</label>
                    <input id="username" name="username" type="text" required minlength="3" class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div class="sm:col-span-2">
                    <label class="mb-1 block text-sm font-medium" for="password">Password</label>
                    <input id="password" name="password" type="password" required minlength="6" class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium" for="first_name">First name</label>
                    <input id="first_name" name="first_name" type="text" class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium" for="last_name">Last name</label>
                    <input id="last_name" name="last_name" type="text" class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div class="sm:col-span-2">
                    <label class="mb-1 block text-sm font-medium" for="phone">Phone</label>
                    <input id="phone" name="phone" type="text" class="w-full rounded-lg border border-gray-300 px-3 py-2 outline-none focus:border-gray-700">
                </div>
                <div class="sm:col-span-2">
                    <button type="submit" class="w-full rounded-lg bg-gray-900 px-4 py-2 font-medium text-white hover:bg-black">Create account</button>
                </div>
            </form>
            <p class="mt-4 text-sm text-gray-600">Already registered? <a href="/login" class="font-medium text-gray-900 underline">Sign in</a></p>
        </section>
    </main>
</body>
</html>
