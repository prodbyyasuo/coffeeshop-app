<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sizes - Coffetime</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl font-bold">Product Sizes</h1>
            <a href="/admin" class="px-4 py-2 bg-black text-white rounded-lg">Back</a>
        </div>

        <div class="bg-white rounded-xl shadow p-4">
            <h2 class="font-semibold mb-3">Add size</h2>
            <form method="post" action="/admin/sizes/create" class="grid grid-cols-1 md:grid-cols-6 gap-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <select name="product_id" required class="md:col-span-2 border rounded px-3 py-2">
                    {% for product in products %}
                    <option value="{{ product.id }}">{{ product.name }}</option>
                    {% endfor %}
                </select>
                <input name="size" placeholder="Size" required class="border rounded px-3 py-2">
                <input name="price" type="number" min="0.01" step="0.01" placeholder="Price" required class="border rounded px-3 py-2">
                <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_available" checked> active</label>
                <button class="px-4 py-2 bg-black text-white rounded">Add</button>
            </form>
        </div>

        <div class="space-y-3">
            {% set ns = namespace(has_sizes=false) %}
            {% for product in products %}
                {% for size in product.sizes %}
                {% set ns.has_sizes = true %}
                <form method="post" action="/admin/sizes/{{ size.id }}/update" class="bg-white rounded-xl shadow p-4 grid grid-cols-1 md:grid-cols-7 gap-3">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="md:col-span-2 flex items-center text-sm text-gray-700">{{ product.name }}</div>
                    <input name="size" value="{{ size.size }}" required class="border rounded px-3 py-2">
                    <input name="price" type="number" min="0.01" step="0.01" value="{{ "%.2f"|format(size.price) }}" required class="border rounded px-3 py-2">
                    <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_available" {% if size.is_available %}checked{% endif %}> active</label>
                    <div class="flex gap-2">
                        <button class="px-3 py-2 bg-black text-white rounded">Save</button>
                        <button formaction="/admin/sizes/{{ size.id }}/delete" formmethod="post" onclick="return confirm('Delete size?')" class="px-3 py-2 bg-red-600 text-white rounded">Delete</button>
                    </div>
                </form>
                {% endfor %}
            {% endfor %}
            {% if not ns.has_sizes %}
            <div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">No sizes</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
