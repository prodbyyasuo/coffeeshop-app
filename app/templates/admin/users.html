<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Users - Coffetime</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
    <div class="max-w-7xl mx-auto p-6 space-y-6">
        <div class="flex items-center justify-between">
            <h1 class="text-2xl font-bold">Users</h1>
            <a href="/admin" class="px-4 py-2 bg-black text-white rounded-lg">Back</a>
        </div>

        <div class="space-y-3">
            {% for user in users %}
            <div class="bg-white rounded-xl shadow p-4">
                <div class="mb-3">
                    <p class="font-semibold">{{ user.email }}</p>
                    <p class="text-sm text-gray-600">{{ user.username }} | role: {{ user.role.value }} | {{ "active" if user.is_active else "inactive" }}</p>
                </div>
                <div class="flex flex-wrap gap-2">
                    <form method="post" action="/admin/users/{{ user.id }}/role" class="flex items-center gap-2">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <select name="role" class="border rounded px-3 py-2 text-sm">
                            <option value="customer" {% if user.role.value == "customer" %}selected{% endif %}>customer</option>
                            <option value="admin" {% if user.role.value == "admin" %}selected{% endif %}>admin</option>
                        </select>
                        <button class="px-3 py-2 bg-black text-white rounded text-sm">Save role</button>
                    </form>

                    <form method="post" action="/admin/users/{{ user.id }}/status" class="flex items-center gap-2">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <label class="flex items-center gap-2 text-sm border rounded px-3 py-2">
                            <input type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
                            active
                        </label>
                        <button class="px-3 py-2 bg-black text-white rounded text-sm">Save status</button>
                    </form>

                    <form method="post" action="/admin/users/{{ user.id }}/delete">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <button onclick="return confirm('Delete user?')" class="px-3 py-2 bg-red-600 text-white rounded text-sm">Delete</button>
                    </form>
                </div>
            </div>
            {% else %}
            <div class="bg-white rounded-xl shadow p-8 text-center text-gray-500">No users</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
