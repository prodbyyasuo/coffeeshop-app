version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: coffee_shop_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-coffee_shop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - coffee_shop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: coffee_shop_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-coffee_shop}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-your-session-secret-key-here}
      DEBUG: ${DEBUG:-False}
    volumes:
      - ../app:/app/app
      - ../alembic:/app/alembic
      - ../alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - coffee_shop_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    container_name: coffee_shop_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../app/static:/usr/share/nginx/html/static:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - coffee_shop_network

volumes:
  postgres_data:

networks:
  coffee_shop_network:
    driver: bridge
